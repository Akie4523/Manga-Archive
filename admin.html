<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Manga Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&display=swap"
    rel="stylesheet" />
  <script>
    if (!localStorage.getItem("adminToken")) { window.location.href = "login.html"; }
    tailwind.config = { darkMode: 'class' }
    if (localStorage.getItem("dark") === "true") { document.documentElement.classList.add("dark"); }
  </script>
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen font-['Noto_Sans_Thai']">

  <nav
    class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-5xl mx-auto px-4 h-16 flex justify-between items-center">
      <a href="index.html" class="font-bold text-blue-600 dark:text-blue-400">← กลับหน้าหลัก</a>
      <button onclick="localStorage.clear(); window.location.href='login.html'"
        class="text-sm text-red-500">Logout</button>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 py-10">
    <div
      class="bg-white dark:bg-slate-900 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-800 p-6 md:p-10">
      <h1 id="form-title" class="text-3xl font-bold mb-8 text-center">จัดการข้อมูลมังงะ</h1>

      <form id="manga-form" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-sm font-semibold opacity-70">ชื่อเรื่องหลัก (Display Title) *</label>
            <input type="text" id="title" required
              class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 outline-none focus:ring-2 ring-blue-500/50 transition">
          </div>
          <div class="space-y-2">
            <label class="text-sm font-semibold opacity-70">URL รูปหน้าปก *</label>
            <input type="url" id="cover" required
              class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 outline-none focus:ring-2 ring-blue-500/50 transition">
          </div>
        </div>

        <div
          class="grid grid-cols-1 md:grid-cols-3 gap-4 p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border border-dashed border-slate-300 dark:border-slate-700">
          <div class="space-y-1">
            <label class="text-xs font-medium opacity-60">ชื่อภาษาไทย (th_name)</label>
            <input type="text" id="th_name"
              class="w-full px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 outline-none focus:ring-1 ring-blue-500">
          </div>
          <div class="space-y-1">
            <label class="text-xs font-medium opacity-60">ชื่อภาษาอังกฤษ (en_name)</label>
            <input type="text" id="en_name"
              class="w-full px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 outline-none focus:ring-1 ring-blue-500">
          </div>
          <div class="space-y-1">
            <label class="text-xs font-medium opacity-60">ชื่อต้นฉบับ (jp_name)</label>
            <input type="text" id="jp_name"
              class="w-full px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 outline-none focus:ring-1 ring-blue-500">
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="space-y-1">
            <label class="text-sm font-semibold opacity-70">ผู้แต่ง (Author)</label>
            <input type="text" id="author"
              class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 outline-none focus:ring-2 ring-blue-500/20">
          </div>
          <div class="space-y-1">
            <label class="text-sm font-semibold opacity-70">ผู้วาด (Artist)</label>
            <input type="text" id="artist"
              class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 outline-none focus:ring-2 ring-blue-500/20">
          </div>
          <div class="space-y-1">
            <label class="text-sm font-semibold opacity-70">ผู้แปล (Translator)</label>
            <input type="text" id="translator"
              class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 outline-none focus:ring-2 ring-blue-500/20">
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-semibold opacity-70">Link โปรไฟล์ผู้แปล (translator_link)</label>
          <input type="url" id="translator_link" placeholder="https://..."
            class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 outline-none focus:ring-2 ring-blue-500/20">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="space-y-1">
            <label class="text-sm font-semibold opacity-70">Link อ่านแปลไทย (thai_url)</label>
            <input type="url" id="thai_url" placeholder="https://..."
              class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 outline-none focus:ring-2 ring-blue-500/20">
          </div>
          <div class="space-y-1">
            <label class="text-sm font-semibold opacity-70">Link อ่านแปล ENG (eng_url)</label>
            <input type="url" id="eng_url" placeholder="https://..."
              class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 outline-none focus:ring-2 ring-blue-500/20">
          </div>
          <div class="space-y-1">
            <label class="text-sm font-semibold opacity-70">Link ต้นฉบับ (original_url)</label>
            <input type="url" id="original_url" placeholder="https://..."
              class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 outline-none focus:ring-2 ring-blue-500/20">
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-semibold opacity-70">หมวดหมู่ (Tags)</label>
          <input type="text" id="tags" placeholder="Action, Fantasy"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 outline-none focus:ring-2 ring-blue-500/20">
        </div>

        <div class="space-y-2">
          <label class="text-sm font-semibold opacity-70">เรื่องย่อ (Description)</label>
          <textarea id="description" rows="5"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 outline-none focus:ring-2 ring-blue-500/20"></textarea>
        </div>

        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-[0.98]">
          บันทึกข้อมูล
        </button>
      </form>
    </div>
  </main>

  <script>
  const API_URL = "https://manga-archive.onrender.com";
  // ดึง editId จาก URL
  const currentEditId = new URLSearchParams(window.location.search).get("editId");

  // 1. โหลดข้อมูลมาใส่ใน Form เมื่อต้องการแก้ไข
  if (currentEditId) {
    document.getElementById("form-title").innerText = "📝 แก้ไขข้อมูลมังงะ";
    
    fetch(`${API_URL}/manga`)
      .then(res => res.json())
      .then(data => {
        // แก้ไขจุดนี้: ให้หา ID ที่ตรงกันไม่ว่าจะชื่อฟิลด์ id หรือ _id
        const m = data.find(x => (x.id || x._id || "").toString() === currentEditId.toString());
        
        if (m) {
          document.getElementById("title").value = m.title || "";
          document.getElementById("cover").value = m.cover || "";
          document.getElementById("th_name").value = m.th_name || "";
          document.getElementById("en_name").value = m.en_name || "";
          document.getElementById("jp_name").value = m.jp_name || "";
          document.getElementById("author").value = m.author || "";
          document.getElementById("artist").value = m.artist || "";
          document.getElementById("translator").value = m.translator || "";
          document.getElementById("translator_link").value = m.translator_link || "";
          document.getElementById("thai_url").value = m.thai_url || "";
          document.getElementById("eng_url").value = m.eng_url || "";
          document.getElementById("original_url").value = m.original_url || "";
          document.getElementById("tags").value = (m.tags || []).join(", ");
          document.getElementById("description").value = m.description || "";
        } else {
          console.error("Manga not found for ID:", currentEditId);
        }
      })
      .catch(err => console.error("Error fetching data:", err));
  }

  // 2. ฟังก์ชันส่งข้อมูล (Add / Update)
  document.getElementById("manga-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const token = localStorage.getItem("adminToken");
    if (!token) return alert("กรุณาเข้าสู่ระบบก่อน");

    const mangaData = {
      title: document.getElementById("title").value,
      cover: document.getElementById("cover").value,
      th_name: document.getElementById("th_name").value,
      en_name: document.getElementById("en_name").value,
      jp_name: document.getElementById("jp_name").value,
      author: document.getElementById("author").value,
      artist: document.getElementById("artist").value,
      translator: document.getElementById("translator").value,
      translator_link: document.getElementById("translator_link").value.trim(),
      thai_url: document.getElementById("thai_url").value,
      eng_url: document.getElementById("eng_url").value,
      original_url: document.getElementById("original_url").value,
      tags: document.getElementById("tags").value.split(",").map(t => t.trim()).filter(t => t),
      description: document.getElementById("description").value,
      updated_at: new Date().toISOString()
    };

    const isEdit = currentEditId && currentEditId !== "null";
    const finalUrl = isEdit ? `${API_URL}/api/manga/${currentEditId}` : `${API_URL}/add`;
    const finalMethod = isEdit ? "PUT" : "POST";

    try {
      const res = await fetch(finalUrl, {
        method: finalMethod,
        headers: { "Content-Type": "application/json", "Authorization": token },
        body: JSON.stringify(mangaData),
      });

      if (res.ok) {
        alert("✅ บันทึกสำเร็จ!");
        location.href = "index.html";
      } else {
        alert("❌ บันทึกไม่สำเร็จ กรุณาลองใหม่");
      }
    } catch (error) { alert("❌ เชื่อมต่อ Server ไม่ได้"); }
});
</script>
</body>

</html>
