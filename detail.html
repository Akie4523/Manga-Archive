<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Details - Manga Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = { darkMode: 'class' }
    if (localStorage.getItem("dark") === "true") { document.documentElement.classList.add("dark"); }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen font-['Noto_Sans_Thai'] transition-colors duration-300">

  <nav class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center">
      <a href="index.html" class="text-sm font-bold flex items-center gap-2 hover:text-blue-500 transition"><span>←</span> กลับหน้าหลัก</a>
    </div>
  </nav>

  <main id="app" class="max-w-6xl mx-auto px-4 py-10"></main>

  <script>
    const API_URL = "https://manga-archive.onrender.com";
    const mangaId = new URLSearchParams(window.location.search).get("id");

    function escapeHTML(str) {
      if (!str) return "";
      return str.replace(/[&<>"']/g, function(m) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
      });
    }

    async function renderPage() {
      try {
        const res = await fetch(`${API_URL}/manga`);
        const data = await res.json();
        const m = data.find(x => (x.id || x._id || "").toString() === mangaId?.toString());
        
        if (!m) {
          document.getElementById("app").innerHTML = `<div class="text-center py-20 opacity-50">ไม่พบข้อมูลมังงะ (ID: ${escapeHTML(mangaId)})</div>`;
          return;
        }

        const displayTitle = m.th_name || m.en_name || m.title || "ไม่มีชื่อเรื่อง";
        const tagsHtml = (m.tags || []).map(t => `<span class="px-3 py-1 bg-blue-100 dark:bg-blue-900/40 text-blue-600 dark:text-blue-300 rounded-full text-[10px] font-bold uppercase tracking-wider">${escapeHTML(t)}</span>`).join("");
        
        const otherNames = [];
        if (m.th_name && m.en_name) otherNames.push({ label: "English", value: m.en_name });
        if (m.jp_name) otherNames.push({ label: "Raw", value: m.jp_name });

        // โครงสร้างใหม่ที่แก้ปัญหา UI พัง
        document.getElementById("app").innerHTML = `
          <div class="flex flex-col lg:flex-row gap-8 lg:gap-12">
            <div class="w-full lg:w-72 flex-shrink-0">
              <div class="sticky top-24">
                <div class="aspect-[3/4] w-full rounded-2xl overflow-hidden shadow-2xl border dark:border-slate-800 mb-6 bg-slate-200 dark:bg-slate-800">
                  <img src="${m.cover}" 
                       alt="${escapeHTML(displayTitle)}"
                       class="w-full h-full object-cover"
                       onerror="this.onerror=null; this.src='https://placehold.co/350x500?text=No+Cover';">
                </div>
                <div id="links-container" class="grid grid-cols-1 gap-3"></div>
              </div>
            </div>

            <div class="flex-1 min-w-0">
              <h1 class="text-3xl md:text-4xl font-black mb-4 leading-tight break-words">${escapeHTML(displayTitle)}</h1>
              <div class="flex flex-wrap gap-2 mb-8">${tagsHtml}</div>
              
              <div class="grid grid-cols-1 xl:grid-cols-2 gap-6 mb-10">
                <div id="info-left" class="space-y-4 bg-white/50 dark:bg-slate-900/50 p-5 rounded-2xl border border-slate-200 dark:border-slate-800/50 shadow-sm"></div>
                <div id="info-right" class="p-5 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm space-y-3"></div>
              </div>

              <div class="space-y-4">
                <h2 class="text-xl font-bold flex items-center gap-2"><span class="w-1.5 h-6 bg-blue-600 rounded-full"></span> เรื่องย่อ</h2>
                <div class="p-6 bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-inner">
                    <p id="manga-desc" class="text-slate-600 dark:text-slate-400 leading-relaxed whitespace-pre-line text-base md:text-lg"></p>
                </div>
              </div>

              <div class="mt-16 pt-8 border-t border-slate-200 dark:border-slate-800 flex justify-end">
                 <button id="edit-btn" class="text-[10px] font-bold opacity-20 hover:opacity-100 transition-all uppercase tracking-widest px-4 py-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-800">Edit Data</button>
              </div>
            </div>
          </div>
        `;

        document.getElementById("manga-desc").textContent = m.description || "ยังไม่มีข้อมูลเรื่องย่อในขณะนี้";

        const infoLeft = document.getElementById("info-left");
        const createInfoRow = (label, value) => `
          <div class="flex items-start gap-4 text-sm">
            <span class="w-24 opacity-50 font-bold text-[10px] uppercase tracking-widest pt-1 flex-shrink-0">${label}</span>
            <span class="font-semibold text-base break-words">${escapeHTML(value) || '-'}</span>
          </div>`;
        
        infoLeft.innerHTML = createInfoRow("Author", m.author) + createInfoRow("Artist", m.artist);
        
        const transDiv = document.createElement("div");
        transDiv.className = "flex items-start gap-4 text-sm w-full";
        transDiv.innerHTML = `<span class="w-24 opacity-50 font-bold text-[10px] uppercase tracking-widest pt-1 flex-shrink-0">Translator</span>`;
        if (m.translator_link) {
          const a = document.createElement("a");
          a.href = m.translator_link; a.target = "_blank";
          a.className = "font-semibold text-base text-blue-500 hover:underline break-all";
          a.textContent = m.translator || '-';
          transDiv.appendChild(a);
        } else {
          const s = document.createElement("span");
          s.className = "font-semibold text-base break-words";
          s.textContent = m.translator || '-';
          transDiv.appendChild(s);
        }
        infoLeft.appendChild(transDiv);

        const infoRight = document.getElementById("info-right");
        infoRight.innerHTML = `<p class="text-[10px] font-black opacity-30 uppercase tracking-[0.2em] mb-2">Other Names</p>` + 
          otherNames.map(n => `<div class="flex gap-3 text-sm"><span class="opacity-40 min-w-[70px] text-xs font-medium flex-shrink-0">${n.label}:</span><span class="font-medium leading-tight break-words">${escapeHTML(n.value)}</span></div>`).join('');
        if (otherNames.length === 0) infoRight.innerHTML += `<p class="text-xs opacity-30 italic font-light text-center py-2">ไม่มีข้อมูลชื่ออื่น</p>`;

        const linksContainer = document.getElementById("links-container");
        if (m.thai_url) {
        const isDirect = m.thai_url.includes('facebook.com') || m.thai_url.includes('nekopost.net');
        const target = isDirect ? m.thai_url : `chapters.html?url=${encodeURIComponent(m.thai_url)}&id=${m.id}`;linksContainer.innerHTML += `<a href="${target}" class="flex items-center justify-center w-full py-4 bg-orange-600 text-white rounded-xl font-bold">🇹🇭 อ่านแปลไทย</a>`;}
        if (m.eng_url) linksContainer.innerHTML += `<a href="${m.eng_url}" target="_blank" class="flex items-center justify-center gap-2 w-full py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg transition hover:scale-[1.02] active:scale-95">🇺🇸 อ่านแปล ENG</a>`;
        if (m.original_url) linksContainer.innerHTML += `<a href="${m.original_url}" target="_blank" class="flex items-center justify-center gap-2 w-full py-3 bg-slate-200 dark:bg-slate-800 rounded-xl font-bold transition hover:scale-[1.02] active:scale-95">🌐 ต้นฉบับ (Raw)</a>`;

        document.getElementById("edit-btn").onclick = () => {
          window.location.href = `admin.html?editId=${m.id || m._id}`;
        };

      } catch (err) {
        console.error("Render Error:", err);
        document.getElementById("app").innerHTML = `<div class="text-center py-20 text-red-500 font-bold">⚠️ Error Loading Data</div>`;
      }
    }

    renderPage();
  </script>
</body>
</html>
