<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Details - Manga Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = { darkMode: 'class' }
    if (localStorage.getItem("dark") === "true") { document.documentElement.classList.add("dark"); }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen font-['Noto_Sans_Thai']">

  <nav class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center">
      <a href="index.html" class="text-sm font-bold flex items-center gap-2 hover:text-blue-500 transition"><span>←</span> กลับหน้าหลัก</a>
    </div>
  </nav>

  <main id="app" class="max-w-6xl mx-auto px-4 py-10"></main>

  <script>
    const API_URL = "https://manga-archive.onrender.com";
    const mangaId = new URLSearchParams(window.location.search).get("id");

    async function renderPage() {
      try {
        const res = await fetch(`${API_URL}/manga`);
        const data = await res.json();
        // หา ID แบบยืดหยุ่น (รองรับ String/Number และ id/_id)
        const m = data.find(x => (x.id || x._id || "").toString() === mangaId?.toString());
        
        if (!m) {
                document.getElementById("app").innerHTML = `<div class="text-center py-20 opacity-50">ไม่พบข้อมูลมังงะ (ID: ${mangaId})</div>`;
                return;
        }
        
        // [SAFETY] กรอง XSS ป้องกันการรันโค้ดแปลกๆ
        const cleanDesc = (m.description || "ยังไม่มีข้อมูลเรื่องย่อในขณะนี้")
        .replace(/</g, "&lt;").replace(/>/g, "&gt;");

        // --- Logic จัดการชื่อเรื่อง ---
        let displayTitle = m.th_name || m.en_name || m.title;
        let otherNames = [];
        if (m.th_name && m.en_name) otherNames.push({ label: "English", value: m.en_name });
        if (m.jp_name) otherNames.push({ label: "ต้นฉบับ", value: m.jp_name });

        // --- Logic ลิงก์ผู้แปล (เพิ่ม Link โปรไฟล์) ---
        const translatorHtml = m.translator_link && m.translator_link.trim() !== "" 
            ? `<a href="${m.translator_link}" target="_blank" class="font-semibold text-base text-blue-500 hover:text-blue-600 hover:underline flex items-center gap-1 transition-all">
                ${m.translator || '-'}
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                </svg>
               </a>`
            : `<span class="font-semibold text-base">${m.translator || '-'}</span>`;

        const tagsHtml = (m.tags || []).map(t => `<span class="px-3 py-1 bg-blue-100 dark:bg-blue-900/40 text-blue-600 dark:text-blue-300 rounded-full text-[10px] font-bold uppercase tracking-wider">${t}</span>`).join("");

        document.getElementById("app").innerHTML = `
          <div class="flex flex-col lg:flex-row gap-12">
            <div class="w-full lg:w-80 flex-shrink-0">
              <div class="sticky top-24">
                <img src="${m.cover}" class="w-full rounded-2xl shadow-2xl border dark:border-slate-800 mb-6">
                
                <div class="grid grid-cols-1 gap-3">
                  ${m.thai_url ? `
                  <a href="${m.thai_url}" target="_blank" class="flex items-center justify-center gap-2 w-full py-4 bg-gradient-to-r from-orange-600 to-red-600 text-white rounded-xl font-bold shadow-lg shadow-red-500/30 hover:scale-[1.02] active:scale-95 transition-all">
                    <span class="text-xl">🇹🇭</span> อ่านแปลไทย
                  </a>` : ""}
                  
                  ${m.eng_url ? `
                  <a href="${m.eng_url}" target="_blank" class="flex items-center justify-center gap-2 w-full py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-500/20 hover:bg-blue-700 transition-all">
                    <span class="text-lg">🇺🇸</span> อ่านแปล ENG
                  </a>` : ""}
                  
                  ${m.original_url ? `
                  <a href="${m.original_url}" target="_blank" class="flex items-center justify-center gap-2 w-full py-3 bg-slate-200 dark:bg-slate-800 rounded-xl font-bold hover:bg-slate-300 dark:hover:bg-slate-700 transition-all">
                    <span class="text-lg">🌐</span> ต้นฉบับ (Raw)
                  </a>` : ""}
                </div>
              </div>
            </div>

            <div class="flex-1">
              <h1 class="text-4xl font-black mb-4 leading-tight">${displayTitle}</h1>
              <div class="flex flex-wrap gap-2 mb-8">${tagsHtml}</div>

              <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                <div class="space-y-4">
                   <div class="flex items-start gap-4 text-sm">
                      <span class="w-24 opacity-50 font-bold text-[10px] uppercase tracking-widest pt-1">Author</span>
                      <span class="font-semibold text-base">${m.author || '-'}</span>
                   </div>
                   <div class="flex items-start gap-4 text-sm">
                      <span class="w-24 opacity-50 font-bold text-[10px] uppercase tracking-widest pt-1">Artist</span>
                      <span class="font-semibold text-base">${m.artist || '-'}</span>
                   </div>
                   <div class="flex items-start gap-4 text-sm">
                      <span class="w-24 opacity-50 font-bold text-[10px] uppercase tracking-widest pt-1">Translator</span>
                      ${translatorHtml}
                   </div>
                </div>

                <div class="p-5 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm space-y-3">
                  <p class="text-[10px] font-black opacity-30 uppercase tracking-[0.2em] mb-2">Other Names</p>
                  ${otherNames.map(n => `
                    <div class="flex gap-3 text-sm">
                      <span class="opacity-40 min-w-[70px] text-xs font-medium">${n.label}:</span>
                      <span class="font-medium leading-tight">${n.value}</span>
                    </div>
                  `).join('')}
                  ${otherNames.length === 0 ? '<p class="text-xs opacity-30 italic font-light text-center py-2">ไม่มีข้อมูลชื่ออื่น</p>' : ''}
                </div>
              </div>

              <div class="space-y-4">
                <h2 class="text-xl font-bold flex items-center gap-2">
                  <span class="w-1.5 h-6 bg-blue-600 rounded-full"></span> เรื่องย่อ
                </h2>
                <div class="p-6 bg-white/50 dark:bg-slate-900/50 rounded-3xl border border-slate-100 dark:border-slate-800/50">
                    <p class="text-slate-600 dark:text-slate-400 leading-relaxed whitespace-pre-line text-lg">
                      ${m.description || "ยังไม่มีข้อมูลเรื่องย่อในขณะนี้"}
                    </p>
                </div>
              </div>

              <div class="mt-16 pt-8 border-t border-slate-200 dark:border-slate-800 flex justify-end">
                 <button onclick="window.location.href='admin.html?editId=${m.id || m._id}'" class="text-[10px] font-bold opacity-20 hover:opacity-100 transition-all uppercase tracking-widest px-4 py-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-800">
                    Edit Data
                 </button>
              </div>
            </div>
          </div>
        `;
      } catch (err) {
        console.error(err);
        document.getElementById("app").innerHTML = `<div class="text-center py-20 text-red-500">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>`;
      }
    }
    renderPage();
  </script>
</body>
</html>
