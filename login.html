<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Manga Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem("dark") === "true") { document.documentElement.classList.add("dark"); }
    </script>
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4 transition-colors duration-300">

    <div class="w-full max-w-[400px]">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black bg-gradient-to-r from-blue-600 to-indigo-500 bg-clip-text text-transparent mb-2">Manga Archive</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm italic">"Akie Project - Secure Access"</p>
        </div>

        <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-800">
            <div class="flex justify-center mb-6 text-4xl">🔐</div>
            
            <form id="loginForm" onsubmit="return false;" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Username</label>
                    <input type="text" id="user" autocomplete="username" required
                           class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 outline-none focus:ring-2 ring-blue-500/50 transition">
                </div>
                
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Password</label>
                    <input type="password" id="pass" autocomplete="current-password" required
                           class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 outline-none focus:ring-2 ring-blue-500/50 transition">
                </div>

                <button type="submit" id="login-btn"
                        class="w-full py-3.5 mt-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-lg transition-all active:scale-95">
                    เข้าสู่ระบบ
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
                <p class="text-slate-400 dark:text-slate-500 text-[11px]">🔒 Unauthorized access is strictly prohibited.</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://manga-archive.onrender.com";

        // ฟังก์ชันป้องกัน XSS สำหรับข้อความแจ้งเตือน
        function escapeHTML(str) {
            if (!str) return "";
            return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            const btn = document.getElementById('login-btn');
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();

            if (!u || !p) return;

            // 1. ป้องกัน Brute Force เบื้องต้น (ปิดปุ่มระหว่างโหลด)
            btn.disabled = true;
            btn.innerHTML = "⏳ ตรวจสอบความปลอดภัย...";

            try {
                // 2. ใช้ HTTPS เสมอ (API_URL ของคุณเป็น https อยู่แล้ว ดีมากครับ)
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: u, password: p })
                });

                const data = await res.json();

                if (data.success) {
                    // 3. การเก็บข้อมูลลง LocalStorage (พยายามอย่าเก็บรหัสผ่านตรงๆ)
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('myFavs', JSON.stringify(data.favorites || []));
                    
                    // Redirect ไปหน้า index
                    window.location.replace('index.html'); 
                } else {
                    // ป้องกันการเดาชื่อผู้ใช้: แจ้งเตือนแบบคลุมเครือ (Generic Error)
                    alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
                    btn.disabled = false;
                    btn.innerHTML = "เข้าสู่ระบบ";
                }
            } catch (err) {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ");
                btn.disabled = false;
                btn.innerHTML = "เข้าสู่ระบบ";
            }
        });
    </script>
</body>
</html>
