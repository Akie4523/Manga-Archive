<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manga Archive - Minimal Collection</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet" />
  
  <script>
    // เช็ก Dark Mode ทันทีป้องกันหน้าขาวแวบ
    tailwind.config = { darkMode: 'class' }
    if (localStorage.getItem("dark") === "true") {
      document.documentElement.classList.add("dark");
    }
  </script>

  <style>
    body { font-family: 'Noto Sans Thai', sans-serif; }
    .manga-card-img { aspect-ratio: 3/4; object-fit: cover; }
    /* สไตล์สำหรับซ่อน Scrollbar แต่ยังเลื่อนได้ */
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

  <nav class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
      <a href="index.html" class="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-500 bg-clip-text text-transparent">
        Manga Archive
      </a>
      
      <div class="flex items-center gap-2 md:gap-4">
        <div class="hidden md:flex gap-4 text-sm font-medium">
          <a href="index.html" class="hover:text-blue-500 transition">Discover</a>
          <a href="favorites.html" class="hover:text-blue-500 transition">My Favorites</a>
        </div>
        <button onclick="toggleDark()" id="dark-toggle-btn" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all text-lg">
          🌙
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-8">
    
    <div class="flex flex-col md:flex-row gap-4 mb-10">
      <div class="relative flex-grow">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 opacity-50">🔍</span>
        <input id="search" type="text" oninput="combinedFilter()" placeholder="ค้นหาชื่อมังงะ..." 
               class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 outline-none focus:ring-2 ring-blue-500/50 transition">
      </div>
      
      <div class="flex gap-2">
        <select id="tag-filter" onchange="combinedFilter()" 
                class="px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 outline-none focus:ring-2 ring-blue-500/50 transition">
          <option value="">🏷️ ทุกหมวดหมู่</option>
        </select>
        <a href="admin.html" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-medium transition shadow-lg shadow-blue-500/20 active:scale-95">
          + เพิ่ม
        </a>
      </div>
    </div>

    <div id="manga-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6">
      <div class="col-span-full text-center py-20 opacity-50">กำลังโหลดข้อมูล...</div>
    </div>
  </main>

  <footer class="py-10 mt-10 border-t border-slate-200 dark:border-slate-800 text-center">
    <p class="text-slate-500 dark:text-slate-400 text-sm">© 2026 Manga Archive - Developed by Akie</p>
    <a href="about.html" class="text-xs text-blue-500 hover:underline mt-2 inline-block">เกี่ยวกับโปรเจกต์นี้</a>
  </footer>

  <script>
    const API_URL = "https://manga-archive.onrender.com";
    let allData = [];

    // --- Dark Mode Logic (คงเดิมแต่ปรับ UI) ---
    function applyDarkMode() {
      const isDark = localStorage.getItem("dark") === "true";
      const btn = document.getElementById("dark-toggle-btn");
      if (isDark) {
        document.documentElement.classList.add("dark");
        btn.innerHTML = "☀️";
      } else {
        document.documentElement.classList.remove("dark");
        btn.innerHTML = "🌙";
      }
    }

    function escapeHTML(str) {
        if (!str) return "";
        return str.replace(/[&<>"']/g, function(m) {
            return {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[m];
        });
    }

    function toggleDark() {
      const isDark = !document.documentElement.classList.contains("dark");
      localStorage.setItem("dark", isDark);
      applyDarkMode();
    }
    applyDarkMode();

    // --- Fetch Data (Logic เดิมของคุณ) ---
    async function init() {
      try {
        const res = await fetch(`${API_URL}/manga`);
        const data = await res.json();
        allData = data;

        // ปรับปรุงหมวดหมู่
        const tagSelect = document.getElementById("tag-filter");
        const tagSet = new Set();
        data.forEach(m => m.tags?.forEach(t => tagSet.add(t.trim())));
        tagSelect.innerHTML = '<option value="">🏷️ ทุกหมวดหมู่</option>'; // Clear old
        Array.from(tagSet).sort().forEach(tag => {
          const option = document.createElement("option");
          option.value = tag;
          option.textContent = tag;
          tagSelect.appendChild(option);
        });

        render(allData);
      } catch (err) {
        console.error(err);
        document.getElementById("manga-list").innerHTML = `<div class="col-span-full text-center py-10 text-red-500 font-bold">❌ ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้</div>`;
      }
    }

    function render(data) {
  const container = document.getElementById("manga-list");
  if (!container) return;
  if (data.length === 0) {
    container.innerHTML = `<div class="col-span-full text-center py-10 opacity-50 text-xl">🚫 ไม่พบมังงะ</div>`;
    return;
  }

  const myFavs = JSON.parse(localStorage.getItem("myFavs")) || [];

  container.innerHTML = data.map(manga => {
    const isFav = myFavs.includes(manga.id.toString());
    // เลือกชื่อที่จะแสดง (ลำดับความสำคัญ: ไทย > อังกฤษ > ชื่อหลัก)
    const displayTitle = manga.th_name || manga.en_name || manga.title || "ไม่มีชื่อเรื่อง";
    
    const tagsHtml = (manga.tags || [])
      .slice(0, 2)
      .map(t => `<span class="bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 text-[9px] font-bold uppercase px-2 py-0.5 rounded-md truncate max-w-[80px]">${escapeHTML(t)}</span>`)
      .join("");

    return `
      <div class="group bg-white dark:bg-slate-900 rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-800 shadow-sm hover:shadow-xl transition-all duration-300 flex flex-col h-full">
        <div class="relative aspect-[3/4] overflow-hidden bg-slate-200 dark:bg-slate-800">
          <img src="${manga.cover}" 
               alt="${escapeHTML(displayTitle)}" 
               class="w-full h-full object-cover group-hover:scale-110 transition duration-500"
               onerror="this.onerror=null; this.src='https://placehold.co/350x500?text=No+Cover'">
          
          <button onclick="toggleBookmark('${escapeHTML(manga.id.toString())}')" 
                  class="absolute top-2 right-2 p-2 rounded-full backdrop-blur-md ${isFav ? 'bg-red-500 text-white shadow-red-500/50' : 'bg-white/80 dark:bg-slate-800/80 text-slate-400'} shadow-sm transition transform active:scale-90 hover:scale-110">
            ${isFav ? "❤️" : "🤍"}
          </button>
        </div>

        <div class="p-3 md:p-4 flex flex-col flex-1">
          <h3 class="font-bold text-sm leading-tight mb-2 h-10 line-clamp-2 group-hover:text-blue-500 transition" title="${escapeHTML(displayTitle)}">
            ${escapeHTML(displayTitle)}
          </h3>
          
          <div class="flex flex-wrap gap-1 mb-4 h-5 items-center overflow-hidden">
            ${tagsHtml}
          </div>
          
          <div class="mt-auto space-y-2">
            <a href="detail.html?id=${escapeHTML(manga.id.toString())}" 
               class="block text-center py-2 rounded-xl bg-blue-600 text-white text-xs font-bold shadow-md shadow-blue-500/20 hover:bg-blue-700 transition active:scale-95">
               รายละเอียด
            </a>
            
            <div class="flex gap-2">
              <button onclick="editManga('${escapeHTML(manga.id.toString())}')" 
                      class="flex-1 py-1.5 rounded-lg border border-slate-200 dark:border-slate-800 text-[10px] font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition">
                แก้ไข
              </button>
              <button onclick="deleteManga('${escapeHTML(manga.id.toString())}')" 
                      class="flex-1 py-1.5 rounded-lg border border-red-100 dark:border-red-900/30 text-red-400 text-[10px] font-bold hover:bg-red-50 dark:hover:bg-red-900/20 transition">
                ลบ
              </button>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

    function combinedFilter() {
      const keyword = document.getElementById("search").value.toLowerCase();
      const selectedTag = document.getElementById("tag-filter").value;
      const filtered = allData.filter(m => {
        const matchTitle = [m.title, m.en_name, m.jp_name, m.th_name].some(n => n?.toLowerCase().includes(keyword));
        const matchTag = selectedTag === "" || m.tags?.includes(selectedTag);
        return matchTitle && matchTag;
      });
      render(filtered);
    }

    async function toggleBookmark(id) {
      const username = localStorage.getItem("username");
      const token = localStorage.getItem("adminToken");
      if (!username) return location.href = "login.html";

      try {
        const res = await fetch(`${API_URL}/favorite`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": token },
          body: JSON.stringify({ username, mangaId: id })
        });
        const result = await res.json();
        if (result.success) {
          localStorage.setItem("myFavs", JSON.stringify(result.favorites));
          init(); 
        }
      } catch (err) { alert("เกิดข้อผิดพลาด"); }
    }

    async function deleteManga(id) {
      if (!confirm("ลบเรื่องนี้จริงไหม?")) return;
      const token = localStorage.getItem("adminToken");
      const res = await fetch(`${API_URL}/delete/${id}`, {
        method: "DELETE",
        headers: { "Authorization": token }
      });
      if (res.ok) init();
      else alert("คุณไม่มีสิทธิ์ลบข้อมูล");
    }

    function editManga(id) {
      window.location.href = `admin.html?editId=${id}`;
    }

    init();
  </script>
</body>
</html>
