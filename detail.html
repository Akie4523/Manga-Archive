<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Details - Manga Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = { darkMode: 'class' }
    if (localStorage.getItem("dark") === "true") { document.documentElement.classList.add("dark"); }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen font-['Noto_Sans_Thai'] transition-colors duration-300">

  <div id="fb-root"></div>
  <script async defer crossorigin="anonymous" src="https://connect.facebook.net/th_TH/sdk.js#xfbml=1&version=v18.0"></script>

  <nav class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center">
      <a href="index.html" class="text-sm font-bold flex items-center gap-2 hover:text-blue-500 transition"><span>←</span> กลับหน้าหลัก</a>
    </div>
  </nav>

  <main id="app" class="max-w-6xl mx-auto px-4 py-10"></main>

  <div id="exit-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-900 w-full max-sm:max-w-xs max-w-sm rounded-2xl p-6 shadow-2xl border dark:border-slate-800">
        <div class="text-3xl mb-4">🚀</div>
        <h3 class="text-xl font-bold mb-2">กำลังออกจากเว็บไซต์</h3>
        <p class="text-slate-500 dark:text-slate-400 text-sm mb-6 leading-relaxed">
            ระบบกำลังจะพาคุณไปยังหน้าเว็บต้นทางข้างนอก: <br>
            <span id="target-link" class="text-blue-500 break-all font-medium underline"></span>
        </p>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="closeExitModal()" class="py-2.5 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-xl font-medium transition text-sm">
                ยกเลิก
            </button>
            <a id="final-link" href="#" class="py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-center rounded-xl font-medium transition shadow-md shadow-blue-500/20 text-sm">
                ตกลง ไปเลย
            </a>
        </div>
    </div>
  </div>

  <script>
    const API_URL = "https://manga-archive.onrender.com";
    const mangaId = new URLSearchParams(window.location.search).get("id");

    function escapeHTML(str) {
      if (!str) return "";
      return str.replace(/[&<>"']/g, function(m) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
      });
    }

    function confirmExit(targetUrl) {
    document.getElementById('target-link').innerText = targetUrl;
    
    let finalUrl = targetUrl;

    try {
        let urlObj = new URL(targetUrl);
        if (urlObj.hostname.includes("facebook.com")) {
            urlObj.hostname = "www.facebook.com";
            if (!urlObj.searchParams.has("v")) {
                urlObj.searchParams.set("v", "feed"); 
            }
        }
        finalUrl = urlObj.toString();
    } catch (e) {
        finalUrl = targetUrl;
    }

    const finalLinkEl = document.getElementById('final-link');
    finalLinkEl.href = finalUrl;
    finalLinkEl.target = "_blank"; 
    finalLinkEl.rel = "noopener noreferrer";

    document.getElementById('exit-modal').classList.remove('hidden');
}

    function closeExitModal() {
        document.getElementById('exit-modal').classList.add('hidden');
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById('exit-modal')) closeExitModal();
    }

    async function renderPage() {
      try {
        const res = await fetch(`${API_URL}/manga`);
        const data = await res.json();
        const m = data.find(x => (x.id || x._id || "").toString() === mangaId?.toString());
        
        if (!m) {
          document.getElementById("app").innerHTML = `<div class="text-center py-20 opacity-50">ไม่พบข้อมูลมังงะ (ID: ${escapeHTML(mangaId)})</div>`;
          return;
        }

        const displayTitle = m.th_name || m.en_name || m.title || "ไม่มีชื่อเรื่อง";
        const tagsHtml = (m.tags || []).map(t => `<span class="px-3 py-1 bg-blue-100 dark:bg-blue-900/40 text-blue-600 dark:text-blue-300 rounded-full text-[10px] font-bold uppercase tracking-wider">${escapeHTML(t)}</span>`).join("");
        
        const otherNames = [];
        if (m.th_name && m.en_name) otherNames.push({ label: "English", value: m.en_name });
        if (m.jp_name) otherNames.push({ label: "Raw", value: m.jp_name });

        // 🛠️ จุดแก้ไขสำคัญ: เพิ่มคลาส lg:hidden ไว้ที่กล่อง #fb-post-section เพื่อสั่งซ่อนบนจอ PC
        document.getElementById("app").innerHTML = `
          <div class="flex flex-col lg:flex-row gap-8 lg:gap-12">
            <div class="w-full lg:w-72 flex-shrink-0">
              <div class="sticky top-24 space-y-4">
                <div class="aspect-[3/4] w-full rounded-2xl overflow-hidden shadow-2xl border dark:border-slate-800 bg-slate-200 dark:bg-slate-800">
                  <img src="${m.cover}" 
                       alt="${escapeHTML(displayTitle)}"
                       class="w-full h-full object-cover"
                       onerror="this.onerror=null; this.src='https://placehold.co/350x500?text=No+Cover';">
                </div>
                <div id="links-container" class="grid grid-cols-1 gap-3"></div>
                
                <div id="fb-post-section" class="hidden lg:hidden space-y-2 !mt-6">
                  <h2 class="text-xl font-bold flex items-center gap-2 dark:text-amber-400"><span class="w-1.5 h-6 bg-blue-500 rounded-full"></span> ⚠️ คำแนะนำการอ่านบน Facebook</h2>
                  <div id="fb-embed-container" class="w-full bg-white dark:bg-slate-900 p-1.5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm"></div>
                </div>
              </div>
            </div>

            <div class="flex-1 min-w-0">
              <h1 class="text-3xl md:text-4xl font-black mb-4 leading-tight break-words">${escapeHTML(displayTitle)}</h1>
              <div class="flex flex-wrap gap-2 mb-8">${tagsHtml}</div>
              
              <div class="grid grid-cols-1 xl:grid-cols-2 gap-6 mb-10">
                <div id="info-left" class="space-y-4 bg-white/50 dark:bg-slate-900/50 p-5 rounded-2xl border border-slate-200 dark:border-slate-800/50 shadow-sm"></div>
                <div id="info-right" class="p-5 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm space-y-3"></div>
              </div>

              <div class="space-y-4">
                <h2 class="text-xl font-bold flex items-center gap-2"><span class="w-1.5 h-6 bg-blue-600 rounded-full"></span> เรื่องย่อ</h2>
                <div class="p-6 bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-inner">
                    <p id="manga-desc" class="text-slate-600 dark:text-slate-400 leading-relaxed whitespace-pre-line text-base md:text-lg"></p>
                </div>
              </div>

              <div class="mt-16 pt-8 border-t border-slate-200 dark:border-slate-800 flex justify-end">
                 <button id="edit-btn" class="text-[10px] font-bold opacity-20 hover:opacity-100 transition-all uppercase tracking-widest px-4 py-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-800">Edit Data</button>
              </div>
            </div>
          </div>
        `;

        document.getElementById("manga-desc").textContent = m.description || "ยังไม่มีข้อมูลเรื่องย่อในขณะนี้";

        if (m.facebook_post_url) {
          // สั่งให้ถอดคลาส hidden บนมือถือออก แต่อำนาจของ lg:hidden จะคอยกดล็อกไม่ให้แสดงบนคอมตามเดิม
          document.getElementById("fb-post-section").classList.remove("hidden");
          const container = document.getElementById("fb-embed-container");

          container.innerHTML = container.innerHTML = `
          <div class="w-full max-w-xl mx-auto my-2 p-6 rounded-2xl bg-gradient-to-br from-blue-50 to-indigo-50 dark:from-slate-900 dark:to-slate-900/40 border border-blue-100 dark:border-blue-900/40 text-center shadow-sm">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-[#1877F2]/10 text-[#1877F2] dark:text-blue-400 mb-4 animate-bounce">
              <svg class="w-7 h-7 fill-current" viewBox="0 0 24 24">
                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
              </svg>
            </div>
            <h3 class="text-lg font-bold mb-1 text-slate-800 dark:text-slate-200">ผลงานนี้เผยแพร่บน Facebook</h3>
            
            <div class="text-xs text-slate-600 dark:text-slate-400 max-w-sm mx-auto mb-5 text-left space-y-1.5 bg-white/60 dark:bg-slate-950/40 p-3 rounded-xl border border-slate-200/60 dark:border-slate-800/60">

              <p class="opacity-80 text-[11px] leading-relaxed mb-2 text-center">เนื่องจากแอป Facebook บนมือถือจะบังคับเข้าสู่แอปของตัวเอง ทำให้ไม่สามารถเปิดลิ้งอ่านได้</p>
              <div class="border-t border-slate-200/40 my-2"></div>
              <p>1. แนะนำให้คลิกปุ่ม <span class="font-bold text-blue-600 dark:text-blue-400">"คัดลอกลิงก์ตรง"</span> ด้านล่าง</p>
              <p>2. นำลิงก์ไปวางในแอปเบราว์เซอร์แยก เช่น <span class="font-bold">Chrome / Safari</span></p>
              <p>3. กดตั้งค่าเบราว์เซอร์ เลือก <span class="font-bold">"เว็บไซต์เวอร์ชันเดสก์ท็อป" (Desktop Mode)</span></p>
              <p>4. ปรับมุมมองในคลังภาพจากแบบตาราง ให้เป็น <span class="font-bold text-emerald-600 dark:text-emerald-400">"มุมมองแบบฟีด" (Feed View)</span> เพื่อให้มีโพสเรียงขึ้นมาและสะดวกในการอ่านและติดตามตอนต่อๆไป</p>
            </div>

            <div class="flex flex-col sm:flex-row gap-2 justify-center items-center">
              <a href="#" onclick="event.preventDefault(); confirmExit('${m.facebook_post_url}')" 
                class="inline-flex items-center justify-center gap-2.5 w-full sm:w-auto px-6 py-3 bg-[#1877F2] hover:bg-[#166FE5] active:bg-[#1464CD] text-white text-sm font-bold rounded-xl shadow-md shadow-blue-500/20 transition-all transform hover:scale-[1.01] active:scale-95">
                <span>📖</span> เปิดอ่านระบบเดิม
              </a>
              
              <button onclick="navigator.clipboard.writeText('${m.facebook_post_url}'); alert('📋 คัดลอกลิงก์เรียบร้อยแล้ว! นำลิงก์นี้ไปวางใน Chrome/Safari แล้วปรับเป็น Desktop Mode + มุมมองแบบฟีด ได้เลยครับ');"
                      type="button"
                      class="inline-flex items-center justify-center gap-2 w-full sm:w-auto px-6 py-3 bg-slate-200 hover:bg-slate-300 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-800 dark:text-slate-200 text-sm font-bold rounded-xl transition-all">
                <span>📋</span> คัดลอกลิงก์ตรง
              </button>
            </div>
          </div>
        `;
        }

        const infoLeft = document.getElementById("info-left");
        const createInfoRow = (label, value) => `
          <div class="flex items-start gap-4 text-sm">
            <span class="w-24 opacity-50 font-bold text-[10px] uppercase tracking-widest pt-1 flex-shrink-0">${label}</span>
            <span class="font-semibold text-base break-words">${escapeHTML(value) || '-'}</span>
          </div>`;
        
        infoLeft.innerHTML = createInfoRow("Author", m.author) + createInfoRow("Artist", m.artist);
        
        const transDiv = document.createElement("div");
        transDiv.className = "flex items-start gap-4 text-sm w-full";
        transDiv.innerHTML = `<span class="w-24 opacity-50 font-bold text-[10px] uppercase tracking-widest pt-1 flex-shrink-0">Translator</span>`;
        if (m.translator_link) {
          const a = document.createElement("a");
          a.href = m.translator_link; a.target = "_blank";
          a.className = "font-semibold text-base text-blue-500 hover:underline break-all";
          a.textContent = m.translator || '-';
          transDiv.appendChild(a);
        } else {
          const s = document.createElement("span");
          s.className = "font-semibold text-base break-words";
          s.textContent = m.translator || '-';
          transDiv.appendChild(s);
        }
        infoLeft.appendChild(transDiv);

        const infoRight = document.getElementById("info-right");
        infoRight.innerHTML = `<p class="text-[10px] font-black opacity-30 uppercase tracking-[0.2em] mb-2">Other Names</p>` + 
          otherNames.map(n => `<div class="flex gap-3 text-sm"><span class="opacity-40 min-w-[70px] text-xs font-medium flex-shrink-0">${n.label}:</span><span class="font-medium leading-tight break-words">${escapeHTML(n.value)}</span></div>`).join('');
        if (otherNames.length === 0) infoRight.innerHTML += `<p class="text-xs opacity-30 italic font-light text-center py-2">ไม่มีข้อมูลชื่ออื่น</p>`;

        const linksContainer = document.getElementById("links-container");
        if (m.thai_url) {
            const isDirect = m.thai_url.includes('facebook.com') || m.thai_url.includes('nekopost.net');
            const target = isDirect ? m.thai_url : `chapters.html?url=${encodeURIComponent(m.thai_url)}&id=${m.id}`;
            const onclickAttr = isDirect ? `onclick="event.preventDefault(); confirmExit('${m.thai_url}')"` : "";
            linksContainer.innerHTML += `<a href="${target}" ${onclickAttr} class="flex items-center justify-center w-full py-4 bg-orange-600 hover:bg-orange-700 text-white rounded-xl font-bold shadow-lg transition hover:scale-[1.02] active:scale-95 text-center px-4">🇹🇭 อ่านแปลไทย</a>`;
        }
        if (m.thai_url_Buy) {
            const isDirect = m.thai_url_Buy.includes('facebook.com') || m.thai_url_Buy.includes('nekopost.net');
            const target = isDirect ? m.thai_url_Buy : `chapters.html?url=${encodeURIComponent(m.thai_url_Buy)}&id=${m.id}`;
            const onclickAttr = isDirect ? `onclick="event.preventDefault(); confirmExit('${m.thai_url_Buy}')"` : "";
            linksContainer.innerHTML += `<a href="${target}" ${onclickAttr} class="flex items-center justify-center w-full py-4 bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold shadow-lg transition hover:scale-[1.02] active:scale-95 text-center px-4">🇹🇭 อ่านแปลไทย (เสียเงิน)</a>`;
        }
        if (m.eng_url) linksContainer.innerHTML += `<a href="#" onclick="event.preventDefault(); confirmExit('${m.eng_url}')" class="flex items-center justify-center gap-2 w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-lg transition hover:scale-[1.02] active:scale-95 text-center px-4">🇺🇸 Read ENG translation</a>`;
        if (m.eng_url_Buy) linksContainer.innerHTML += `<a href="#" onclick="event.preventDefault(); confirmExit('${m.eng_url_Buy}')" class="flex items-center justify-center gap-2 w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold shadow-lg transition hover:scale-[1.02] active:scale-95 text-center px-4">🇺🇸 Read ENG translation (Buy)</a>`;
        if (m.original_url) linksContainer.innerHTML += `<a href="#" onclick="event.preventDefault(); confirmExit('${m.original_url}')" class="flex items-center justify-center gap-2 w-full py-3 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 rounded-xl font-bold transition hover:scale-[1.02] active:scale-95 text-center px-4">🌐 
Original (Raw)</a>`;
        if (m.original_url_Buy) linksContainer.innerHTML += `<a href="#" onclick="event.preventDefault(); confirmExit('${m.original_url_Buy}')" class="flex items-center justify-center gap-2 w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold shadow-lg transition hover:scale-[1.02] active:scale-95 text-center px-4">🌐 
Original (Raw / Buy)</a>`;

        document.getElementById("edit-btn").onclick = () => {
          window.location.href = `admin.html?editId=${m.id || m._id}`;
        };

      } catch (err) {
        console.error("Render Error:", err);
        document.getElementById("app").innerHTML = `<div class="text-center py-20 text-red-500 font-bold">⚠️ Error Loading Data</div>`;
      }
    }

    renderPage();
  </script>
</body>
</html>
