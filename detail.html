<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manga Archive - Details</title>

  <script>
    if (localStorage.getItem("dark") === "true") {
      document.documentElement.classList.add("dark");
    }
  </script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />

  <link rel="apple-touch-icon" sizes="180x180" href="assets/img/Assets.xcassets/AppIcon.appiconset/180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="assets/img/Assets.xcassets/AppIcon.appiconset/152.png">

  <link rel="icon" type="image/png" sizes="192x192" href="assets/img/playstore.png">

  <link rel="manifest" href="manifest.json">

</head>

<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">📖 Manga Archive</a>

      <!-- Mobile back button on the navbar -->
      <button type="button" class="btn btn-back-navbar-mobile btn-outline-secondary ms-auto d-lg-none"
        onclick="history.back()">
        ← ย้อนกลับ
      </button>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Discover</a></li>
          <li class="nav-item"><a class="nav-link" href="favorites.html">My Favorites</a></li>

          <li class="nav-item ms-lg-3">
            <div class="d-flex align-items-center gap-3">
              <a href="about.html" class="nav-link about-link d-none d-sm-inline">About</a>
              <div id="authSection"></div>
              <button onclick="toggleDark()" class="btn-toggle-dark" id="dark-toggle-btn">🌙</button>
            </div>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="py-5" id="app">
    <div class="container text-center py-5 text-muted">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-3">กำลังโหลดข้อมูลรายละเอียด...</p>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const API_URL = "https://manga-archive.onrender.com"; // ** เปลี่ยนเป็น URL ของคุณ **
    const username = localStorage.getItem("username");
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    // --- Dark Mode System ---
    function applyDarkMode() {
      const isDark = localStorage.getItem("dark") === "true";
      document.documentElement.classList.toggle("dark", isDark);
      const btn = document.getElementById("dark-toggle-btn");
      if (btn) btn.innerHTML = isDark ? "☀️" : "🌙";
    }
    function toggleDark() {
      localStorage.setItem("dark", !document.documentElement.classList.contains("dark"));
      applyDarkMode();
    }
    applyDarkMode();

    // --- Favorite Logic ---
    async function toggleFavorite(mangaId) {
      if (!username) {
        alert("กรุณาเข้าสู่ระบบก่อนเพิ่มรายการโปรด");
        window.location.href = "login.html";
        return;
      }

      try {
        const res = await fetch(`${API_URL}/favorite`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': localStorage.getItem('adminToken')
          },
          body: JSON.stringify({ username, mangaId })
        });
        const result = await res.json();
        if (result.success) {
          localStorage.setItem('myFavs', JSON.stringify(result.favorites));
          renderPage(); // รีโหลดเพื่อเปลี่ยนสีหัวใจ
        }
      } catch (err) {
        console.error("Favorite Error:", err);
      }
    }

    // --- Render Page ---
    async function renderPage() {
      if (!id) {
        document.getElementById("app").innerHTML = `<div class='container text-center py-5'>❌ ไม่มี ID มังงะ</div>`;
        return;
      }

      try {
        const res = await fetch(`${API_URL}/manga`);
        const data = await res.json();
        const manga = data.find((m) => m.id == id);

        if (!manga) {
          document.getElementById("app").innerHTML = `<div class='container text-center py-5'>❌ ไม่เจอข้อมูลมังงะ</div>`;
          return;
        }

        // ตรวจสอบว่าเป็นรายการโปรดหรือยัง
        const myFavIds = JSON.parse(localStorage.getItem('myFavs')) || [];
        const isFav = myFavIds.includes(manga.id.toString());

        const tagsHtml = (manga.tags || []).map(tag => `<span class="tag-badge">${tag.trim()}</span>`).join("");
        const transLink = manga.translator_link || manga.contact;
        const translatorHTML = transLink
          ? `<a href="${transLink}" target="_blank" class="translator-badge text-decoration-none">🌐 ${manga.translator || "ไม่ระบุ"}</a>`
          : `<span class="translator-badge">🌐 ${manga.translator || "ไม่ระบุ"}</span>`;

        // จัดการการแสดงชื่อ: ใช้ชื่อ ENG ถ้าไม่มีชื่อไทย
        const displayTitle = manga.title || manga.en_name || manga.jp_name || "ไม่ระบุชื่อ";
        
        // ถ้าหัวข้อใหญ่เป็น ENG ก็ไม่แสดง ENG ในส่วนชื่ออื่นๆ
        const showEngInSub = !(displayTitle === manga.en_name && manga.en_name);

        document.getElementById("app").innerHTML = `
            <div class="container">
              <div class="detail-card">
                <div class="row g-5">
                  <div class="col-md-4 text-center">
                    <div class="detail-cover-wrap" style="max-width: 350px; margin: 0 auto;">
                      <img src="${manga.cover || ''}" class="detail-cover shadow rounded w-100" alt="${displayTitle}">
                      <button type="button" class="btn btn-back btn-back-mobile btn-outline-light" onclick="history.back()">
                        ← ย้อนกลับ
                      </button>
                    </div>
                  </div>
                  <div class="col-md-8">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                      <div>
                        <h1 class="detail-title-th mb-2">${displayTitle}</h1>
                        <div class="detail-title-sub-stack">
                          ${manga.title ? `<div class="detail-title-sub text-muted">${manga.jp_name || ""}</div>
                          ${showEngInSub ? `<div class="detail-title-sub text-muted">${manga.en_name || ""}</div>` : ""}` : `<div class="detail-title-sub text-muted">${manga.jp_name || ""}</div>`}
                        </div>
                      </div>
                      <div class="detail-actions-top">
                        <button type="button" class="btn btn-back btn-back-desktop btn-outline-secondary" onclick="history.back()">
                          ← ย้อนกลับ
                        </button>
                        <button onclick="toggleFavorite('${manga.id}')" class="btn btn-fav ${isFav ? 'active' : ''}">
                          ${isFav ? '❤️' : '🤍'}
                        </button>
                      </div>
                    </div>

                    <p class="manga-desc text-muted">${manga.description || "ไม่มีเรื่องย่อ"}</p>
                    <hr class="my-4" style="opacity: 0.1;">

                    <ul class="info-list mb-4 list-unstyled">
                      <li class="mb-2"><strong>Author:</strong> ${manga.author || "-"}</li>
                      <li class="mb-2"><strong>Artist:</strong> ${manga.artist || "-"}</li>
                      <li class="mb-2"><strong>Translator:</strong> ${translatorHTML}</li>
                    </ul>

                    <div class="mb-4">${tagsHtml}</div>

                    <div class="d-flex flex-wrap gap-3">
                      ${manga.thai_url ? `<a href="${manga.thai_url}" class="btn btn-primary px-4 py-2" target="_blank">📖 อ่านแปลไทย</a>` : ""}
                      ${manga.eng_url ? `<a href="${manga.eng_url}" class="btn btn-outline-secondary px-4 py-2" target="_blank">📖 อ่านแปล ENG</a>` : ""}
                      ${manga.original_url ? `<a href="${manga.original_url}" class="btn btn-outline-secondary px-4 py-2" target="_blank">🌐 ต้นฉบับ</a>` : ""}
                    </div>
                  </div>
                </div>
              </div>
            </div>`;
      } catch (err) {
        document.getElementById("app").innerHTML = `<div class="container text-center py-5 text-danger">❌ โหลดข้อมูลล้มเหลว</div>`;
      }
    }

    renderPage();
  </script>

  <style>
    /* เพิ่มเติม CSS สำหรับปุ่ม Favorite */
    .btn-fav {
      font-size: 1.5rem;
      background: var(--bg-card);
      border: 1px solid #ddd;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .btn-fav:hover {
      transform: scale(1.1);
    }

    .btn-fav.active {
      border-color: #ff4757;
    }

    html.dark .btn-fav {
      border-color: #444;
    }
  </style>
  <footer class="py-4 mt-5 border-top text-center">
    <div class="container">
      <p class="text-muted mb-1">© 2024 Manga Archive - Developed by Akie</p>
      <a href="about.html" class="text-decoration-none text-secondary small">เกี่ยวกับโปรเจกต์นี้</a>
    </div>
  </footer>
</body>

</html>
